# Fly.io deployment configuration for IFC Bonsai MCP Server

app = "ifc-bonsai-mcp"
primary_region = "sjc"  # San Jose (best for US)

[build]
  builder = "pacer"
  buildpacks = ["heroku/buildpacks:20"]

[env]
  HTTP_PORT = "8080"
  PYTHONUNBUFFERED = "true"

[[services]]
  internal_port = 8080
  processes = ["app"]
  
  [services.concurrency]
    type = "connections"
    hard_limit = 100
    soft_limit = 80

  [[services.ports]]
    port = 80
    handlers = ["http"]
    force_https = true

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [services.tcp_checks]
    enabled = true
    grace_period = "90s"
    interval = "30s"
    timeout = "5s"

[checks]
  [checks.status]
    type = "http"
    interval = "30s"
    timeout = "5s"
    grace_period = "90s"
    method = "GET"
    path = "/health"
